<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدونة – زيد اللحام</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1e; --card: #0f1a30; --card2: #0d1826;
      --border: rgba(0,170,255,0.13); --border2: rgba(0,170,255,0.28);
      --accent: #00aaff; --accent2: #00e5ff;
      --text: #e8f4ff; --text2: #8baac8; --text3: #3d6080; --green: #00d4aa;
      --amber: #f59e0b; --purple: #a78bfa; --coral: #f87171;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,170,255,0.035) 1px,transparent 1px), linear-gradient(90deg,rgba(0,170,255,0.035) 1px,transparent 1px);
      background-size: 44px 44px; pointer-events: none; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.18; pointer-events: none; z-index: 0; }
    .orb-1 { width:550px; height:550px; background:radial-gradient(circle,#0055bb,transparent); top:-180px; right:-120px; }
    .orb-2 { width:420px; height:420px; background:radial-gradient(circle,#6d28d9,transparent); bottom:80px; left:-120px; }
    header { position: relative; z-index: 1; padding: 1.75rem 1.25rem 0; display: flex; justify-content: center; }
    .top-nav { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; }
    .nav-pill {
      display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.9rem;
      border-radius: 50px; border: 1px solid var(--border2); background: rgba(0,170,255,0.06);
      color: var(--accent); text-decoration: none; font-size: 0.78rem; font-weight: 600; transition: all 0.2s;
    }
    .nav-pill:hover { background: rgba(0,170,255,0.14); color: var(--accent2); transform: translateY(-1px); }
    .nav-pill.active { background: rgba(0,170,255,0.18); color: var(--accent2); border-color: var(--accent); }
    .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 1.25rem 5rem; }
    .hero { text-align: center; padding: 2.5rem 1rem 2rem; }
    .hero h1 {
      font-size: clamp(1.6rem,4vw,2.5rem); font-weight: 900; line-height: 1.2; margin-bottom: 0.3rem;
      background: linear-gradient(135deg,#e8f4ff 0%,var(--accent) 55%,var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero .tag { font-size: 0.88rem; color: var(--text2); }
    .sec-label { display: flex; align-items: center; gap: 0.65rem; margin: 2.2rem 0 1.4rem; }
    .sec-label::before { content:''; height:1px; flex:1; background:linear-gradient(to right,transparent,var(--border2)); }
    .sec-label::after  { content:''; height:1px; flex:1; background:linear-gradient(to left,transparent,var(--border2)); }
    .sec-label span { font-size:0.72rem; font-weight:700; letter-spacing:0.1em; color:var(--accent); font-family:'JetBrains Mono',monospace; white-space:nowrap; }
    /* ── Admin panel ── */
    .new-post-toggle {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.8rem;
      border-radius: 12px; border: 1px dashed var(--border2); background: transparent;
      color: var(--accent); font-family: 'Cairo', sans-serif; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; margin-bottom: 1.5rem;
    }
    .new-post-toggle:hover { background: rgba(0,170,255,0.07); border-style: solid; }
    .post-form {
      background: var(--card); border: 1px solid var(--border2); border-radius: 16px;
      padding: 1.5rem; margin-bottom: 2rem; display: none; flex-direction: column; gap: 1rem;
    }
    .post-form.open { display: flex; animation: fadeUp 0.3s ease; }
    .form-row { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-row label { font-size: 0.75rem; color: var(--text2); font-weight: 700; font-family:'JetBrains Mono',monospace; letter-spacing:0.05em; }
    .form-row input, .form-row textarea, .form-row select {
      background: #0a0f1e; border: 1px solid var(--border2); border-radius: 9px;
      color: var(--text); font-family: 'Cairo', sans-serif; font-size: 0.88rem;
      padding: 0.65rem 0.85rem; outline: none; transition: border-color 0.2s; resize: vertical;
    }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row textarea { min-height: 140px; direction: ltr; text-align: left; font-family: monospace; }
    .form-actions { display: flex; gap: 0.65rem; justify-content: flex-end; }
    .btn-primary {
      padding: 0.65rem 1.5rem; border-radius: 50px; border: none; cursor: pointer;
      background: linear-gradient(135deg,var(--accent),#0055cc);
      color: #fff; font-family: 'Cairo', sans-serif; font-size: 0.88rem; font-weight: 700;
      transition: all 0.2s; box-shadow: 0 0 18px rgba(0,170,255,0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(0,170,255,0.45); }
    .btn-secondary {
      padding: 0.65rem 1.2rem; border-radius: 50px; border: 1px solid var(--border2);
      background: transparent; color: var(--text2); font-family: 'Cairo', sans-serif;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    /* Image upload area */
    .img-upload-area {
      border: 2px dashed var(--border2); border-radius: 9px; padding: 1.2rem;
      text-align: center; cursor: pointer; transition: all 0.2s; color: var(--text3);
      font-size: 0.82rem;
    }
    .img-upload-area:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,170,255,0.04); }
    .img-upload-area input { display: none; }
    .img-previews { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .img-preview-wrap { position: relative; }
    .img-preview-wrap img { width: 80px; height: 80px; object-fit: cover; border-radius: 7px; border: 1px solid var(--border2); display: block; }
    .img-preview-wrap .remove-img {
      position: absolute; top: -6px; right: -6px; width: 18px; height: 18px;
      background: var(--coral); border-radius: 50%; border: none; color: #fff;
      font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    /* ── Tag pills ── */
    .tag-pill { display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 0.18rem 0.55rem; border-radius: 20px; font-family:'JetBrains Mono',monospace; letter-spacing:0.04em; }
    .tag-cyber   { background:rgba(167,139,250,0.12); color:var(--purple); border:1px solid rgba(167,139,250,0.25); }
    .tag-network { background:rgba(0,170,255,0.1);    color:var(--accent); border:1px solid rgba(0,170,255,0.22); }
    .tag-linux   { background:rgba(0,212,170,0.1);    color:var(--green);  border:1px solid rgba(0,212,170,0.22); }
    .tag-general { background:rgba(245,158,11,0.1);   color:var(--amber);  border:1px solid rgba(245,158,11,0.22); }
    .tag-tools   { background:rgba(248,113,113,0.1);  color:var(--coral);  border:1px solid rgba(248,113,113,0.22); }
    /* ── Filter bar ── */
    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .filter-btn { padding: 0.35rem 0.85rem; border-radius: 50px; font-size: 0.73rem; font-weight: 700; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family:'Cairo',sans-serif; transition: all 0.18s; }
    .filter-btn:hover, .filter-btn.active { background: rgba(0,170,255,0.1); color: var(--accent); border-color: var(--accent); }
    /* ── Post cards (collapsed) ── */
    .posts-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .post-card {
      background: var(--card2); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; transition: border-color 0.22s;
    }
    .post-card:hover { border-color: var(--border2); }
    .post-card-header {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 1rem 1.2rem; cursor: pointer; user-select: none;
    }
    .post-card-header:hover { background: rgba(0,170,255,0.04); }
    .post-chevron {
      font-size: 0.65rem; color: var(--text3); transition: transform 0.25s; flex-shrink: 0;
    }
    .post-card.expanded .post-chevron { transform: rotate(90deg); }
    .post-card-meta { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; flex-wrap: wrap; }
    .post-card-title { font-size: 0.95rem; font-weight: 800; color: var(--text); flex: 1; line-height: 1.4; }
    .post-date { font-size: 0.65rem; color: var(--text3); font-family:'JetBrains Mono',monospace; }
    /* ── Post body (expanded) ── */
    .post-card-body {
      display: none; padding: 0 1.2rem 1.2rem;
      border-top: 1px solid var(--border);
    }
    .post-card.expanded .post-card-body { display: block; animation: fadeUp 0.2s ease; }
    .post-content {
      direction: ltr; text-align: left;
      font-size: 0.9rem; color: var(--text2); line-height: 1.85;
      white-space: pre-wrap; word-break: break-word;
      padding-top: 1rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .post-images { display: flex; flex-wrap: wrap; gap: 0.65rem; margin-top: 1rem; }
    .post-images img {
      max-width: 100%; border-radius: 10px; border: 1px solid var(--border2);
      cursor: pointer; transition: transform 0.2s;
    }
    .post-images img:hover { transform: scale(1.02); }
    .post-card-actions { display: flex; align-items: center; justify-content: flex-end; gap: 0.6rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
    .btn-delete { font-size: 0.72rem; color: var(--text3); background: none; border: none; cursor: pointer; font-family:'Cairo',sans-serif; font-weight:600; padding:0; transition: color 0.18s; }
    .btn-delete:hover { color: var(--coral); }
    /* ── Lightbox ── */
    .lightbox { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.88); display: none; align-items: center; justify-content: center; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 10px; }
    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 3.5rem 1rem; color: var(--text3); }
    .empty-state .big-icon { font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.4; }
    .empty-state p { font-size: 0.88rem; }
    /* ── Corner login ── */
    .corner-login-btn {
      position: fixed; bottom: 1.5rem; left: 1.5rem; z-index: 999;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(0,170,255,0.08); border: 1px solid var(--border2);
      color: var(--text3); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .corner-login-btn:hover { background: rgba(0,170,255,0.18); color: var(--accent); border-color: var(--accent); }
    /* ── Login modal ── */
    .login-modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    .login-modal-overlay.open { display: flex; animation: fadeUp 0.25s ease; }
    .login-modal {
      background: var(--card); border: 1px solid var(--border2);
      border-radius: 16px; padding: 1.75rem; width: 100%; max-width: 340px;
      display: flex; flex-direction: column; gap: 1rem; margin: 1rem;
    }
    .login-modal h3 { font-size: 1rem; font-weight: 800; text-align: center; color: var(--text); }
    .login-modal input {
      background: #0a0f1e; border: 1px solid var(--border2); border-radius: 9px;
      color: var(--text); font-family: 'Cairo', sans-serif; font-size: 0.88rem;
      padding: 0.65rem 0.85rem; outline: none; transition: border-color 0.2s; width: 100%;
    }
    .login-modal input:focus { border-color: var(--accent); }
    .login-modal-actions { display: flex; gap: 0.65rem; }
    .wrong-pass { font-size: 0.75rem; color: var(--coral); text-align: center; display: none; }
    .admin-indicator { font-size:0.72rem; color:var(--green); font-family:'JetBrains Mono',monospace; }
    .btn-logout { background:none; border:1px solid var(--border2); color:var(--text3); font-family:'Cairo',sans-serif; font-size:0.75rem; padding:0.35rem 0.85rem; border-radius:50px; cursor:pointer; transition:all 0.2s; }
    .btn-logout:hover { border-color:var(--coral); color:var(--coral); }
    footer { position: relative; z-index: 1; text-align: center; padding: 2rem 1.25rem; border-top: 1px solid var(--border); color: var(--text3); font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .fi { animation: fadeUp 0.45s ease forwards; }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Corner login button -->
<button class="corner-login-btn" id="cornerBtn" onclick="openLoginModal()" title="تسجيل دخول">🔑</button>

<!-- Login modal -->
<div class="login-modal-overlay" id="loginOverlay" onclick="overlayClick(event)">
  <div class="login-modal">
    <h3>🔐 دخول الإدارة</h3>
    <p class="wrong-pass" id="wrongMsg">❌ كلمة المرور خاطئة</p>
    <input type="password" id="adminPass" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')tryLogin()" />
    <div class="login-modal-actions">
      <button class="btn-secondary" style="flex:1" onclick="closeLoginModal()">إلغاء</button>
      <button class="btn-primary" style="flex:1" onclick="tryLogin()">دخول</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="" />
</div>

<header>
  <nav class="top-nav fi">
    <a href="index.html" class="nav-pill">🏠 الرئيسية</a>
    <a href="blog.html" class="nav-pill active">✍️ المدونة</a>
  </nav>
</header>

<div class="wrap">
  <section class="hero fi">
    <h1>المدونة التقنية</h1>
    <p class="tag">مقالات ، نصائح ، وتجارب في عالم أمن الشبكات</p>
  </section>

  <!-- Admin panel — only visible when logged in -->
  <div id="adminPanel" style="display:none">
    <div class="sec-label"><span>// NEW POST</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
      <span class="admin-indicator">● وضع الإدارة مفعّل</span>
      <button class="btn-logout" onclick="logout()">تسجيل خروج</button>
    </div>
    <button class="new-post-toggle" onclick="toggleForm()">✏️ &nbsp; كتابة منشور جديد</button>
  </div>

  <div class="post-form" id="postForm">
    <div class="form-row">
      <label>عنوان المنشور</label>
      <input type="text" id="postTitle" placeholder="Post title..." />
    </div>
    <div class="form-row">
      <label>التصنيف</label>
      <select id="postTag">
        <option value="network">🌐 Network</option>
        <option value="cyber">🔐 Cybersecurity</option>
        <option value="linux">🐧 Linux</option>
        <option value="general">🪟 Windows</option>
        <option value="tools">🛠️ Tools</option>
      </select>
    </div>
    <div class="form-row">
      <label>المحتوى (left-to-right)</label>
      <textarea id="postBody" placeholder="Write your post content here..."></textarea>
    </div>
    <div class="form-row">
      <label>الصور (اختياري)</label>
      <div class="img-upload-area" onclick="document.getElementById('imgInput').click()">
        🖼️ &nbsp; اضغط لإضافة صور
        <input type="file" id="imgInput" accept="image/*" multiple onchange="handleImages(event)" />
      </div>
      <div class="img-previews" id="imgPreviews"></div>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="toggleForm()">إلغاء</button>
      <button class="btn-primary" onclick="publishPost()">🚀 نشر</button>
    </div>
  </div>

  <div class="sec-label fi"><span>// POSTS · المنشورات</span></div>

  <div class="filter-bar fi">
    <button class="filter-btn active" onclick="filterPosts('all', this)">الكل</button>
    <button class="filter-btn" onclick="filterPosts('network', this)">🌐 Network</button>
    <button class="filter-btn" onclick="filterPosts('cyber', this)">🔐 Cybersecurity</button>
    <button class="filter-btn" onclick="filterPosts('linux', this)">🐧 Linux</button>
    <button class="filter-btn" onclick="filterPosts('general', this)">🪟 Windows</button>
    <button class="filter-btn" onclick="filterPosts('tools', this)">🛠️ Tools</button>
  </div>

  <div class="posts-list fi" id="postsList"></div>
</div>

<footer>
  <p>© 2026 · Zaid Al-Laham · <span style="color:var(--accent)">Network Security Engineer</span></p>
</footer>
<script>
  const ADMIN_HASH = '5b189033f0fa5f440149380f6426d57b348df6053d06aef0751c8d70e86090b2';
  const BIN_ID  = '69d91843aaba882197e504c8';
  const API_KEY = '$2a$10$j2hJxmPP27SDs4trZcgOPeX9kPLMsa8hcV2kCdZWw5RRQ5dC7ZtMi';
  const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  const TAG_CONFIG = {
    network: { label: '🌐 Network',       cls: 'tag-network', color: '#00aaff' },
    cyber:   { label: '🔐 Cybersecurity', cls: 'tag-cyber',   color: '#a78bfa' },
    linux:   { label: '🐧 Linux',         cls: 'tag-linux',   color: '#00d4aa' },
    tools:   { label: '🛠️ Tools',         cls: 'tag-tools',   color: '#f87171' },
    general: { label: '🪟 Windows',       cls: 'tag-general', color: '#f59e0b' },
  };

  let currentFilter = 'all';
  let pendingImages = [];
  let allPosts = [];

  // ── JSONBin API ──
  async function fetchPosts() {
    try {
      const res = await fetch(BIN_URL + '/latest', {
        headers: { 'X-Master-Key': API_KEY }
      });
      const data = await res.json();
      allPosts = data.record.posts || [];
    } catch(e) {
      allPosts = [];
    }
  }

  async function savePosts() {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ posts: allPosts })
    });
  }

  // ── Auth ──
  function isAdmin() { return sessionStorage.getItem('blog_admin') === 'yes'; }

  function openLoginModal() {
    document.getElementById('loginOverlay').classList.add('open');
    document.getElementById('adminPass').focus();
  }
  function closeLoginModal() {
    document.getElementById('loginOverlay').classList.remove('open');
    document.getElementById('wrongMsg').style.display = 'none';
    document.getElementById('adminPass').value = '';
  }
  function overlayClick(e) {
    if (e.target === document.getElementById('loginOverlay')) closeLoginModal();
  }
  async function tryLogin() {
    const val = document.getElementById('adminPass').value;
    const msgBuf = new TextEncoder().encode(val);
    const hashBuf = await crypto.subtle.digest('SHA-256', msgBuf);
    const hashHex = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2,'0')).join('');
    if (hashHex === ADMIN_HASH) {
      sessionStorage.setItem('blog_admin', 'yes');
      updateAdminUI();
    } else {
      document.getElementById('wrongMsg').style.display = 'block';
    }
  }
  function logout() {
    sessionStorage.removeItem('blog_admin');
    document.getElementById('postForm').classList.remove('open');
    updateAdminUI();
  }
  function updateAdminUI() {
    const admin = isAdmin();
    document.getElementById('cornerBtn').style.display  = admin ? 'none' : 'flex';
    document.getElementById('adminPanel').style.display = admin ? 'block' : 'none';
    closeLoginModal();
    renderPosts();
  }

  // ── Form ──
  function toggleForm() {
    const f = document.getElementById('postForm');
    f.classList.toggle('open');
    if (f.classList.contains('open')) document.getElementById('postTitle').focus();
  }

  // ── Images ──
  function handleImages(e) {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => { pendingImages.push(ev.target.result); renderPreviews(); };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  }
  function renderPreviews() {
    document.getElementById('imgPreviews').innerHTML = pendingImages.map((src, i) =>
      '<div class="img-preview-wrap"><img src="' + src + '" />'
      + '<button class="remove-img" onclick="removeImg(' + i + ')">✕</button></div>'
    ).join('');
  }
  function removeImg(i) { pendingImages.splice(i, 1); renderPreviews(); }

  // ── Publish ──
  async function publishPost() {
    if (!isAdmin()) return;
    const title = document.getElementById('postTitle').value.trim();
    const body  = document.getElementById('postBody').value.trim();
    const tag   = document.getElementById('postTag').value;
    if (!title || !body) { alert('الرجاء تعبئة العنوان والمحتوى'); return; }

    const btn = document.querySelector('#postForm .btn-primary');
    btn.textContent = '⏳ جاري الحفظ...';
    btn.disabled = true;

    allPosts.unshift({
      id: Date.now().toString(), title, body, tag,
      images: pendingImages.slice(),
      date: new Date().toLocaleDateString('ar-JO', { year:'numeric', month:'long', day:'numeric' })
    });

    await savePosts();

    document.getElementById('postTitle').value = '';
    document.getElementById('postBody').value = '';
    pendingImages = [];
    renderPreviews();
    document.getElementById('postForm').classList.remove('open');
    btn.textContent = '🚀 نشر';
    btn.disabled = false;
    renderPosts();
  }

  // ── Delete ──
  async function deletePost(id) {
    if (!isAdmin()) return;
    if (!confirm('هل تريد حذف هذا المنشور؟')) return;
    allPosts = allPosts.filter(p => p.id !== id);
    await savePosts();
    renderPosts();
  }

  // ── Toggle card ──
  function togglePost(id) {
    const card = document.getElementById('pc-' + id);
    if (card) card.classList.toggle('expanded');
  }

  // ── Filter ──
  function filterPosts(tag, btn) {
    currentFilter = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPosts();
  }

  // ── Lightbox ──
  function openLightboxById(postId, idx) {
    const post = allPosts.find(p => p.id === postId);
    const src = post && (post.images || [])[idx];
    if (src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('open'); }
  }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Render ──
  function renderPosts() {
    const list = document.getElementById('postsList');
    let posts = allPosts;
    if (currentFilter !== 'all') posts = posts.filter(p => p.tag === currentFilter);

    if (posts.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="big-icon">✍️</div><p>'
        + (currentFilter === 'all' ? 'لا توجد منشورات بعد.' : 'لا توجد منشورات في هذا التصنيف.')
        + '</p></div>';
      return;
    }

    list.innerHTML = posts.map(post => {
      const tc = TAG_CONFIG[post.tag] || TAG_CONFIG.general;
      const imgsHtml = (post.images || []).map((src, idx) =>
        '<img src="' + src + '" onclick="openLightboxById(\'' + post.id + '\',' + idx + ')" style="max-height:260px" />'
      ).join('');
      const deleteBtn = isAdmin()
        ? '<button class="btn-delete" onclick="event.stopPropagation();deletePost(\'' + post.id + '\')">🗑️ حذف</button>'
        : '';
      return '<div class="post-card" id="pc-' + post.id + '">'
        + '<div class="post-card-header" onclick="togglePost(\'' + post.id + '\')">'
        + '<span class="post-chevron">▶</span>'
        + '<div class="post-card-title">' + escHtml(post.title) + '</div>'
        + '<div class="post-card-meta">'
        + '<span class="tag-pill ' + tc.cls + '">' + tc.label + '</span>'
        + '<span class="post-date">' + post.date + '</span>'
        + '</div></div>'
        + '<div class="post-card-body">'
        + '<div class="post-content">' + escHtml(post.body) + '</div>'
        + (imgsHtml ? '<div class="post-images">' + imgsHtml + '</div>' : '')
        + (isAdmin() ? '<div class="post-card-actions">' + deleteBtn + '</div>' : '')
        + '</div></div>';
    }).join('');
  }

  // ── Init: load posts then show ──
  (async function init() {
    document.getElementById('postsList').innerHTML =
      '<div class="empty-state"><div class="big-icon" style="animation:pulse 1.5s infinite">⏳</div><p>جاري تحميل المنشورات...</p></div>';
    await fetchPosts();
    updateAdminUI();
  })();
</script>

</body>
</html>
